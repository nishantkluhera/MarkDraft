<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      line-height: 1.65; color: #24292e; background-color: #fff;
      padding: 8px; font-size: 10.5pt;
    }
    h1, h2, h3, h4, h5, h6 { margin-top: 1.4em; margin-bottom: 0.5em; font-weight: 600; line-height: 1.25; color: #1b1f24; letter-spacing: -0.01em; page-break-after: avoid; }
    h1 { font-size: 1.9em; border-bottom: 2px solid #eaecef; padding-bottom: 0.3em; }
    h2 { font-size: 1.45em; border-bottom: 1px solid #eaecef; padding-bottom: 0.25em; }
    h3 { font-size: 1.2em; }
    h4 { font-size: 1em; }
    h5 { font-size: 0.875em; }
    h6 { font-size: 0.85em; color: #6a737d; }
    p { margin-top: 0; margin-bottom: 1em; }
    a { color: #0366d6; text-decoration: none; font-weight: 500; }
    strong { font-weight: 700; color: #1b1f24; }
    code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace; background-color: rgba(27,31,35,0.05); padding: 0.2em 0.4em; margin: 0; font-size: 85%; border-radius: 4px; }
    pre { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace; padding: 14px 16px; overflow: auto; font-size: 85%; line-height: 1.5; background-color: #f6f8fa; border-radius: 8px; margin-top: 0; margin-bottom: 1em; word-wrap: normal; page-break-inside: avoid; border: 1px solid #eaecef; }
    pre code { display: inline; max-width: auto; padding: 0; margin: 0; overflow: visible; line-height: inherit; word-wrap: normal; background-color: transparent; border: 0; font-size: 100%; white-space: pre; color: inherit; }
    blockquote { padding: 0.6em 1em; color: #57606a; border-left: 0.25em solid #0366d6; background-color: rgba(3,102,214,0.05); border-radius: 0 6px 6px 0; margin: 0 0 1em; }
    blockquote > :first-child { margin-top: 0; }
    blockquote > :last-child { margin-bottom: 0; }
    ul, ol { padding-left: 1.8em; margin-top: 0; margin-bottom: 1em; }
    li { word-wrap: break-word; margin-bottom: 0.3em; }
    li > p { margin-top: 0.2em; margin-bottom: 0.2em; }
    table { border-collapse: collapse; width: 100%; display: table; overflow: hidden; margin-top: 0; margin-bottom: 1em; border-spacing: 0; page-break-inside: auto; border: 1px solid #d0d7de; border-radius: 8px; }
    table tr { page-break-inside: avoid; page-break-after: auto; }
    table th, table td { padding: 8px 14px; border-bottom: 1px solid #d0d7de; text-align: left; vertical-align: top; }
    table tr:last-child td { border-bottom: 0; }
    table th { font-weight: 600; background-color: #f6f8fa; color: #1b1f24; }
    table tbody tr:nth-child(even) { background-color: #f6f8fa; }
    hr { height: 1px; padding: 0; margin: 1.6em 0; background-color: #e1e4e8; border: 0; overflow: hidden; box-sizing: content-box; }
    img { max-width: 100%; height: auto; box-sizing: content-box; background-color: #fff; border-radius: 6px; page-break-inside: avoid; }

    /* highlight.js tokens (github light) */
    .hljs-comment, .hljs-quote { color: #6a737d; font-style: italic; }
    .hljs-keyword, .hljs-selector-tag, .hljs-literal, .hljs-section, .hljs-doctag, .hljs-type, .hljs-symbol, .hljs-bullet { color: #d73a49; }
    .hljs-string, .hljs-meta .hljs-string, .hljs-regexp { color: #032f62; }
    .hljs-number, .hljs-link { color: #005cc5; }
    .hljs-title, .hljs-title.function_, .hljs-title.class_ { color: #6f42c1; font-weight: 600; }
    .hljs-built_in, .hljs-builtin-name, .hljs-class { color: #e36209; }
    .hljs-attr, .hljs-attribute, .hljs-variable, .hljs-template-variable, .hljs-property, .hljs-params { color: #005cc5; }
    .hljs-tag, .hljs-name, .hljs-selector-id, .hljs-selector-class { color: #22863a; }
    .hljs-meta { color: #6a737d; }
    .hljs-emphasis { font-style: italic; }
    .hljs-strong { font-weight: 700; }
  </style>
</head>
<body>
  {{markdownContent}}
</body>
</html>
