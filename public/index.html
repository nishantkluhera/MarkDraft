<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Convert Markdown to Word documents and PDFs easily">
    <meta name="author" content="Nishant Luhera">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    
    <title>MarkDraft - Convert Markdown to Documents</title>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <div class="app-container">
        <header class="app-header">
            <h1>MarkDraft <i class="fa-solid fa-wand-magic-sparkles logo-icon"></i></h1>
            <p class="tagline">Convert Markdown to Professional Documents</p>
        </header>

        <main class="converter-section" id="main-content">
            <section class="input-area">
                <label for="markdownInput" class="input-label">
                    Paste your Markdown content:
                </label>
                <div class="textarea-wrapper">
                    <textarea 
                        id="markdownInput" 
                        placeholder="## Your Title&#10;&#10;Enter your markdown content here...&#10;&#10;**Bold text** and *italic text*&#10;&#10;- List item 1&#10;- List item 2&#10;&#10;```&#10;code block&#10;```" 
                        rows="16" 
                        spellcheck="false"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                    ></textarea>
                    <button 
                        id="clearBtn" 
                        class="clear-button" 
                        title="Clear all text"
                        type="button"
                    >
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </section>

            <section class="options-group">
                <fieldset class="pdf-options">
                    <legend>PDF Options</legend>
                    <div class="radio-group">
                        <input type="radio" id="orientationPortrait" name="pdfOrientation" value="portrait" checked>
                        <label for="orientationPortrait">
                            <i class="fa-solid fa-file"></i> Portrait
                        </label>
                    </div>
                    <div class="radio-group">
                        <input type="radio" id="orientationLandscape" name="pdfOrientation" value="landscape">
                        <label for="orientationLandscape">
                            <i class="fa-solid fa-file-lines"></i> Landscape
                        </label>
                    </div>
                </fieldset>
            </section>

            <section class="action-buttons">
                <button id="convertToWordBtn" class="action-button" type="button">
                    <span class="button-icon">
                        <i class="fa-solid fa-file-word"></i>
                    </span>
                    <span class="button-text">Create Word (.docx)</span>
                    <span class="button-spinner">
                        <i class="fa-solid fa-spinner fa-spin"></i>
                    </span>
                </button>
                
                <button id="convertToPdfBtn" class="action-button" type="button">
                    <span class="button-icon">
                        <i class="fa-solid fa-file-pdf"></i>
                    </span>
                    <span class="button-text">Generate PDF</span>
                    <span class="button-spinner">
                        <i class="fa-solid fa-spinner fa-spin"></i>
                    </span>
                </button>
            </section>

            <div id="statusMessage" class="status-area" role="status" aria-live="polite">
                <!-- Status messages will appear here -->
            </div>
        </main>

        <footer class="app-footer">
            <p>© 2024 MarkDraft. <a href="https://github.com/nishantkluhera/MarkDraft" target="_blank" rel="noopener noreferrer">Open Source</a></p>
        </footer>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
